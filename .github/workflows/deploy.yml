name: Deploy to EC2

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build the Gradle
        run: ./gradlew bootJar -x test

      - name: Build Docker image
        run: docker build -t chess-server .

      - name: Save Docker image
        run: docker save chess-server | gzip > chess-server.tar.gz

      - name: Copy files to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          source: "chess-server.tar.gz,docker-compose.yml"
          target: "/home/ubuntu"

      - name: Create .env file
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            echo "JWT_SECRETS=${{ secrets.JWT_SECRET }}" > /home/ubuntu/.env

      - name: Deploy on EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            docker load < chess-server.tar.gz
            docker compose down
            docker compose up -d
            rm chess-server.tar.gz