<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChessMate</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <style>
        .signup-wrap {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .signup-card {
            width: 100%;
            max-width: 360px;
            padding: 32px;
        }

        .signup-header {
            margin-bottom: 28px;
        }

        .signup-logo {
            font-size: 18px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 6px;
        }
    </style>
</head>
<body>

    <div class="signup-wrap">
        <div class="signup-card card">
            <div class="signup-header">
                <div class="signup-logo">ChessMate</div>
            </div>

            <form id="signupForm" class="form">
                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" required>
                </div>
                <div class="form-group">
                    <label for="nickname">닉네임</label>
                    <input type="text" id="nickname" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full">회원가입</button>
            </form>

            <p id="message" class="message message-error" style="display: none; margin-top: 12px;"></p>
            <div class="text-center mt-16">
                <span class="text-muted">이미 계정이 있으신가요?</span>
                <a href="/login.html">로그인</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const response = await fetch('/api/auth/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value,
                    nickname: document.getElementById('nickname').value
                })
            });

            if (response.status === 201) {
                window.location.href = '/login.html'
            } else {
                const msg = document.getElementById('message');
                msg.textContent = '회원가입에 실패했습니다. 다시 시도해주세요.';
                msg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
