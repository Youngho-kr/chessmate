<!DOCTYPE html>
<html>
    <head>
        <meta charset = "utf-8">
        <title>Game Test</title>
        <script src="https://cdn.jsdelivr.net/npm/sockjs-client/dist/sockjs.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs/bundles/stomp.umd.min.js"></script>
    </head>
    <body>
        <h1>게임 테스트</h1>
        <input id="token" placeholder="Access Token" style="width:400px">
        <button onclick="connect()">연결</button>
        <br><br>
        <button onclick="join()">매칭 신청</button>
        <br><br>
        <input id="san" placeholder="수 입력 (예: e4)">
        <button onclick="move()">수 입력</button>
        <br><br>
        <button onclick="resign()">기권</button>
        <button onclick="drawOffer()">무승부 제안</button>
        <button onclick="drawAccept()">무승부 수락</button>
        <button onclick="drawDecline()">무승부 거절</button>
        <div id="log"></div>

        <script>
            let client;
            let gameId;

            function log(msg) {
                document.getElementById('log').innerHTML += `<p>${JSON.stringify(msg)}</p>`;
            }

            function connect() {
                const token = document.getElementById('token').value;
                client = new StompJs.Client({
                    webSocketFactory: () => new SockJS('/ws-chess'),
                    connectHeaders: { Authorization: 'Bearer ' + token },
                    onConnect: () => {
                        log('연결 성공');
                        client.subscribe('/user/queue/match', (msg) => {
                            const data = JSON.parse(msg.body);
                            gameId = data.gameId;
                            log('매칭 결과: ' + msg.body);
                            client.subscribe('/topic/game/' + gameId, (gameMsg) => {
                                log('게임 이벤트: ' + gameMsg.body);
                            });
                        });
                    }
                });
                client.activate();
            }

            function join() {
                client.publish({ destination: '/app/match/join' });
                log('매칭 신청');
            }

            function move() {
                const san = document.getElementById('san').value;
                client.publish({
                    destination: '/app/game/' + gameId + '/move',
                    body: JSON.stringify({ san: san })
                });
            }
            function resign() {
                client.publish({
                    destination: '/app/game/' + gameId + '/resign'
                });
                log('기권');
            }

            function drawOffer() {
                client.publish({
                    destination: '/app/game/' + gameId + '/draw',
                    body: JSON.stringify({ action: 'OFFER' })
                });
                log('무승부 제안');
            }

            function drawAccept() {
                client.publish({
                    destination: '/app/game/' + gameId + '/draw',
                    body: JSON.stringify({ action: 'ACCEPT' })
                });
                log('무승부 수락');
            }

            function drawDecline() {
                client.publish({
                    destination: '/app/game/' + gameId + '/draw',
                    body: JSON.stringify({ action: 'DECLINE' })
                });
                log('무승부 거절');
            }
        </script>
    </body>
</html>
