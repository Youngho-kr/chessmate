<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>ChessMate - 게임 상세</title>
    <link rel="stylesheet"
          href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <style>
        #board { width: 480px; }
        #moveList { margin: 20px 0; }
        .move-item {
            cursor: pointer;
            margin: 3px;
            padding: 2px 5px;
            display: inline-block;
        }
        .move-item.active { background: #f6f669; }
    </style>
</head>
<body>
<h1>게임 상세</h1>

<div id="gameInfo">
    <p id="players"></p>
    <p id="result"></p>
</div>

<div id="board"></div>

<div id="controls">
    <button onclick="goFirst()">⏮</button>
    <button onclick="goPrev()">◀</button>
    <button onclick="goNext()">▶</button>
    <button onclick="goLast()">⏭</button>
</div>

<div id="moveList"></div>

<a href="/main.html">메인으로</a>

<script src="/auth.js"></script>
<script>
    const accessToken = localStorage.getItem('accessToken');
    if (!accessToken) window.location.href = '/';

    const gameId = new URLSearchParams(window.location.search).get('id');
    if (!gameId) window.location.href = '/main.html';

    let board;
    let moves = [];
    let currentMove = 0;

    async function init() {
        const data = await authFetch(`/api/games/${gameId}`).then(r => r.json());

        document.getElementById('players').textContent =
            `${data.whitePlayer} (백) vs ${data.blackPlayer} (흑)`;
        document.getElementById('result').textContent =
            `결과: ${data.result} (${data.resultReason})`;

        moves = data.moves;
        renderMoveList();

        board = Chessboard('board', {
            position: 'start',
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
        });
    }

    function renderMoveList() {
        const list = document.getElementById('moveList');
        list.innerHTML = moves.map((move, i) =>
            `<span id="move-${i}" class="move-item" onclick="goTo(${i + 1})">
                    ${Math.floor(i / 2) + 1}${i % 2 === 0 ? '.' : '...'} ${move}
                </span>`
        ).join('');
    }

    function goTo(index) {
        const chess = new Chess();
        for (let i = 0; i < index; i++) {
            const from = moves[i].substring(0, 2);
            const to = moves[i].substring(2, 4);
            chess.move({ from, to, promotion: 'q' });
        }
        currentMove = index;
        board.position(chess.fen());
        highlightMove();
    }

    function highlightMove() {
        document.querySelectorAll('.move-item').forEach(el => {
            el.classList.remove('active');
        });
        if (currentMove > 0) {
            const el = document.getElementById(`move-${currentMove - 1}`);
            if (el) el.classList.add('active');
        }
    }

    function goFirst() { goTo(0); }
    function goPrev() { if (currentMove > 0) goTo(currentMove - 1); }
    function goNext() { if (currentMove < moves.length) goTo(currentMove + 1); }
    function goLast() { goTo(moves.length); }

    window.onload = init;
</script>
</body>
</html>
