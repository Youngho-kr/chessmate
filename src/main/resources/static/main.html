<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>ChessMate</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs/bundles/stomp.umd.min.js"></script>
</head>
<body>

    <div id="profile">
        <h2 id="nickname"></h2>
        <p>ELO: <span id="eloRating"></span></p>
        <button onclick="logout()">로그아웃</button>
    </div>

    <div id="matchSection">
      <button id="matchBtn" onclick="startMatch()">매치 시작</button>
      <p id="matchStatus"></p>
    </div>

    <div id="gameList">
      <h3>전적 목록</h3>
      <ul id="games"></ul>
      <button id="loadMore" onclick="loadMore()">더 보기</button>
    </div>

    <script src="/auth.js"></script>
    <script>
      let client;
      let page = 0;
      let matching = false;

      const accessToken = localStorage.getItem('accessToken');
      if (!accessToken) window.location.href = '/';

      async function init() {
        const profile = await authFetch('/api/users/me').then(r => r.json());
        document.getElementById('nickname').textContent = profile.nickname;
        document.getElementById('eloRating').textContent = profile.eloRating;
        loadGames();
        connectWebSocket();
      }

      async function loadGames() {
        const data = await authFetch(`/api/games?page=${page}&size=10`).then(r => r.json());
        const list = document.getElementById('games');
        data.content.forEach(game => {
          const li = document.createElement('li');
          li.innerHTML = `
            ${game.whitePlayer} vs ${game.blackPlayer}
            - ${game.result} (${game.resultReason}): gameId - ${game.gameId}
            <a href="/analysis.html?id=${game.gameId}">자세히</a>
          `;
          list.appendChild(li);
        });
        if (data.list) document.getElementById('loadMore').style.display = 'none';
      }

      function loadMore() {
        page++;
        loadGames();
      }

      function connectWebSocket() {
        client = new StompJs.Client({
          webSocketFactory: () => new SockJS('/ws-chess'),
          connectHeaders: { Authorization: 'Bearer ' + accessToken },
          onConnect: () => {
            client.subscribe('/user/queue/match', (msg) => {
              const data = JSON.parse(msg.body);
              sessionStorage.setItem('gameId', data.gameId);
              sessionStorage.setItem('color', data.playerColor);
              sessionStorage.setItem('timeLimit', data.timeLimit);

              window.location.href = '/play.html';
            })
          }
        });
        client.activate();
      }

      function startMatch() {
        if (!matching) {
          client.publish({ destination: '/app/match/join' });
          matching = true;
          document.getElementById('matchBtn').textContent = '매칭 취소'
          document.getElementById('matchStatus').textContent = '매칭 중...';
        } else {
          client.publish({ destination: '/app/match/cancel' });
          matching = false;
          document.getElementById('matchBtn').textContent = '매치 시작';
          document.getElementById('matchStatus').textContent = '';
        }
      }

      window.onload = init;
    </script>
</body>
</html>
