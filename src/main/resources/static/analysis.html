<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>ChessMate - 분석</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <style>
        body { display: flex; flex-direction: column; height: 100vh; margin: 0; font-family: sans-serif; }
        header { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; border-bottom: 1px solid #ddd; }
        .main { display: flex; flex: 1; overflow: hidden; }
        .eval-bar-wrap { display: flex; flex-direction: column; align-items: center; padding: 10px; gap: 4px; }
        .eval-bar-track { flex: 1; width: 14px; background: #eee; border-radius: 4px; overflow: hidden; position: relative; }
        .eval-bar-black { background: #333; width: 100%; transition: height 0.3s; }
        .eval-bar-white { background: #fff; border: 1px solid #ccc; width: 100%; position: absolute; bottom: 0; transition: height 0.3s; }
        .eval-score { font-size: 11px; color: #666; }
        .board-area { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; gap: 10px; }
        #board { width: 480px; }
        .controls { display: flex; align-items: center; gap: 8px; }
        .move-counter { font-size: 12px; color: #666; min-width: 60px; text-align: center; }
        .best-move-hint { font-size: 12px; color: #666; height: 20px; }
        .best-move-hint span { color: #2a9d2a; font-weight: bold; }
        .move-list-panel { width: 280px; border-left: 1px solid #ddd; display: flex; flex-direction: column; overflow: hidden; }
        .panel-header { padding: 10px 14px; font-size: 12px; color: #666; border-bottom: 1px solid #ddd; }
        .move-list { flex: 1; overflow-y: auto; }
        .move-row { display: grid; grid-template-columns: 32px 1fr 1fr; min-height: 32px; align-items: center; }
        .move-num { font-size: 11px; color: #aaa; text-align: center; }
        .move-cell { display: flex; align-items: center; gap: 5px; padding: 4px 8px; cursor: pointer; border-radius: 4px; }
        .move-cell:hover { background: #f5f5f5; }
        .move-cell.active { background: #fff3cd; }
        .move-san { font-family: monospace; font-size: 13px; }
        .class-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
        .dot-BEST { background: #4ade80; }
        .dot-GOOD { background: #60a5fa; }
        .dot-INACCURACY { background: #facc15; }
        .dot-MISTAKE { background: #fb923c; }
        .dot-BLUNDER { background: #f87171; }
        .legend { display: flex; flex-wrap: wrap; gap: 8px; padding: 10px 14px; border-top: 1px solid #ddd; font-size: 10px; color: #666; }
        .legend-item { display: flex; align-items: center; gap: 3px; }
        .accuracy { font-size: 12px; display: flex; gap: 10px; }
    </style>
</head>
<body>

<header>
    <strong>ChessMate</strong>
    <div class="accuracy">
        <span id="whiteAcc">백 --%</span>
        <span id="blackAcc">흑 --%</span>
    </div>
    <a href="/main.html">← 메인</a>
</header>

<div class="main">
    <div class="eval-bar-wrap">
        <small>흑</small>
        <div class="eval-bar-track">
            <div class="eval-bar-black" id="evalBarBlack" style="height:50%"></div>
            <div class="eval-bar-white" id="evalBarWhite" style="height:50%"></div>
        </div>
        <div class="eval-score" id="evalScore">0.00</div>
        <small>백</small>
    </div>

    <div class="board-area">
        <div id="blackPlayer">—</div>
        <div id="board"></div>
        <div id="whitePlayer">—</div>

        <div class="best-move-hint">
            최선의 수: <span id="bestMoveVal"></span>
        </div>

        <div class="controls">
            <button onclick="goFirst()">⏮</button>
            <button onclick="goPrev()">◀</button>
            <span class="move-counter" id="moveCounter">0 / 0</span>
            <button onclick="goNext()">▶</button>
            <button onclick="goLast()">⏭</button>
        </div>
        <small style="color:#aaa">← → 키보드로 이동</small>
    </div>

    <div class="move-list-panel">
        <div class="panel-header">수 목록</div>
        <div class="move-list" id="moveList"></div>
        <div class="legend">
            <div class="legend-item"><div class="class-dot dot-BEST"></div>최선</div>
            <div class="legend-item"><div class="class-dot dot-GOOD"></div>좋음</div>
            <div class="legend-item"><div class="class-dot dot-INACCURACY"></div>부정확</div>
            <div class="legend-item"><div class="class-dot dot-MISTAKE"></div>실수</div>
            <div class="legend-item"><div class="class-dot dot-BLUNDER"></div>블런더</div>
        </div>
    </div>
</div>

<script src="/auth.js"></script>
<script>
    const accessToken = localStorage.getItem('accessToken');
    if (!accessToken) window.location.href = '/';

    const params = new URLSearchParams(window.location.search);
    const gameId = params.get('id');
    if (!gameId) window.location.href = '/main.html';

    let board;
    let chess = new Chess();
    let nodes = [];
    let sanList = [];
    let currentIndex = -1;

    function uciToSan(uciMoves) {
        const c = new Chess();
        const result = [];
        for (const uci of uciMoves) {
            const m = c.move({ from: uci.substring(0, 2), to: uci.substring(2, 4), promotion: 'q' });
            result.push(m ? m.san : uci);
        }
        return result;
    }

    function updateEvalBar(score) {
        const clamped = Math.max(-800, Math.min(800, score));
        const whitePercent = 50 + (clamped / 800) * 48;
        document.getElementById('evalBarWhite').style.height = whitePercent + '%';
        document.getElementById('evalBarBlack').style.height = (100 - whitePercent) + '%';
        document.getElementById('evalScore').textContent = (clamped > 0 ? '+' : '') + (clamped / 100).toFixed(2);
    }

    function renderMoveList() {
        const list = document.getElementById('moveList');
        list.innerHTML = '';
        let i = 0;
        let moveNum = 1;
        while (i < nodes.length) {
            const row = document.createElement('div');
            row.className = 'move-row';

            const numCell = document.createElement('div');
            numCell.className = 'move-num';
            numCell.textContent = moveNum + '.';
            row.appendChild(numCell);

            const whiteCell = createMoveCell(i);
            row.appendChild(whiteCell);

            if (i + 1 < nodes.length) {
                row.appendChild(createMoveCell(i + 1));
            } else {
                row.appendChild(document.createElement('div'));
            }

            list.appendChild(row);
            i += 2;
            moveNum++;
        }
    }

    function createMoveCell(index) {
        const node = nodes[index];
        const cell = document.createElement('div');
        cell.className = 'move-cell';
        cell.id = 'move-cell-' + index;
        cell.innerHTML = `
            <div class="class-dot dot-${node.classification}"></div>
            <span class="move-san">${sanList[index] || node.san}</span>
        `;
        cell.onclick = () => goTo(index);
        return cell;
    }

    function goTo(index) {
        currentIndex = index;
        chess = new Chess();
        for (let i = 0; i <= index; i++) {
            chess.move({ from: nodes[i].san.substring(0, 2), to: nodes[i].san.substring(2, 4), promotion: 'q' });
        }
        board.position(chess.fen());
        updateEvalBar(nodes[index].evalScore);

        const bm = nodes[index].bestMove;
        document.getElementById('bestMoveVal').textContent = bm || '';

        document.getElementById('moveCounter').textContent = (index + 1) + ' / ' + nodes.length;

        document.querySelectorAll('.move-cell').forEach(el => el.classList.remove('active'));
        const activeCell = document.getElementById('move-cell-' + index);
        if (activeCell) {
            activeCell.classList.add('active');
            activeCell.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
        }
    }

    function goFirst() { if (nodes.length > 0) goTo(0); }
    function goPrev()  { if (currentIndex > 0) goTo(currentIndex - 1); }
    function goNext()  { if (currentIndex < nodes.length - 1) goTo(currentIndex + 1); }
    function goLast()  { if (nodes.length > 0) goTo(nodes.length - 1); }

    document.addEventListener('keydown', e => {
        if (e.key === 'ArrowLeft')  { e.preventDefault(); goPrev(); }
        if (e.key === 'ArrowRight') { e.preventDefault(); goNext(); }
    });

    async function init() {
        const gameData = await authFetch(`/api/games/${gameId}`).then(r => r.json());
        document.getElementById('whitePlayer').textContent = gameData.whitePlayer + ' (백)';
        document.getElementById('blackPlayer').textContent = gameData.blackPlayer + ' (흑)';

        const analysisData = await authFetch(`api/analysis/${gameId}`, { method: 'POST' }).then(r => r.json());

        nodes = analysisData.tree;

        document.getElementById('whiteAcc').textContent = '백 ' + analysisData.whiteAccuracy + '%';
        document.getElementById('blackAcc').textContent = '흑 ' + analysisData.blackAccuracy + '%';
        document.getElementById('moveCounter').textContent = '0 / ' + nodes.length;

        sanList = uciToSan(nodes.map(n => n.san));

        board = Chessboard('board', {
            position: 'start',
            draggable: false,
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
        });

        renderMoveList();
        updateEvalBar(0);
    }

    window.onload = init;
</script>
</body>
</html>
