spring:
  datasource:
    url: jdbc:h2:file:/app/data/chess
    username: sa
    password:
      driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  data:
    redis:
      host: redis
      port: 6379
jwt:
  secret: ${JWT_SECRET}
  access-expiration: 1800000
  refresh-expiration: 604800000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    disable-swagger-default-url: true